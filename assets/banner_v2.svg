<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="100%" height="100%">
  <defs>
    <!-- Dot matrix pattern for main background -->
    <pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#30363d" opacity="0.5" />
    </pattern>
    <!-- Grid pattern for terminal window -->
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#21262d" stroke-width="1"/>
    </pattern>
    <!-- Clip path for the terminal card -->
    <clipPath id="card-clip">
      <rect x="120" y="70" width="340" height="200" rx="12"/>
    </clipPath>
  </defs>

  <style>
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    .cursor {
      animation: blink 1.2s infinite;
    }
  </style>

  <!-- Main Background Card -->
  <rect x="2" y="2" width="1196" height="336" rx="16" fill="#0d1117" stroke="#30363d" stroke-width="2"/>
  <rect x="2" y="2" width="1196" height="336" rx="16" fill="url(#dots)"/>

  <!-- Decorative HUD-style Corner Brackets for Safe Zone boundary indicators -->
  <!-- Top-Left -->
  <path d="M 95 60 H 80 V 75" stroke="#30363d" stroke-width="1.5" fill="none" opacity="0.6"/>
  <!-- Top-Right -->
  <path d="M 1105 60 H 1120 V 75" stroke="#30363d" stroke-width="1.5" fill="none" opacity="0.6"/>
  <!-- Bottom-Left -->
  <path d="M 80 285 V 300 H 95" stroke="#30363d" stroke-width="1.5" fill="none" opacity="0.6"/>
  <!-- Bottom-Right -->
  <path d="M 1105 300 H 1120 V 285" stroke="#30363d" stroke-width="1.5" fill="none" opacity="0.6"/>

  <!-- Terminal Window (Left) -->
  <g clip-path="url(#card-clip)">
    <!-- Terminal Background -->
    <rect x="120" y="70" width="340" height="200" fill="#161b22"/>
    <rect x="120" y="120" width="340" height="150" fill="url(#grid)" opacity="0.8"/>
    
    <!-- Top Bar Background -->
    <rect x="120" y="70" width="340" height="50" fill="#0d1117"/>
    <!-- Separator Line -->
    <line x1="120" y1="120" x2="460" y2="120" stroke="#30363d" stroke-width="1.5"/>

    <!-- Window Buttons -->
    <circle cx="150" cy="95" r="6" fill="#ff5f56" opacity="0.8"/>
    <circle cx="170" cy="95" r="6" fill="#ffbd2e" opacity="0.8"/>
    <circle cx="190" cy="95" r="6" fill="#27c93f" opacity="0.8"/>

    <!-- Terminal Title -->
    <text x="290" y="100" fill="#8b949e" font-family="ui-monospace, Consolas, 'SF Mono', monospace" font-size="12" font-weight="600" text-anchor="middle">rss-bookstore</text>

    <!-- Bookshelf & RSS Motif -->
    <!-- Shelf -->
    <line x1="150" y1="230" x2="430" y2="230" stroke="#30363d" stroke-width="3" stroke-linecap="round"/>
    
    <!-- RSS Icon -->
    <circle cx="185" cy="205" r="8" fill="#00e676"/>
    <path d="M 185 181 A 24 24 0 0 1 209 205" fill="none" stroke="#00e676" stroke-width="5" stroke-linecap="round"/>
    <path d="M 185 161 A 44 44 0 0 1 229 205" fill="none" stroke="#00c853" stroke-width="5" stroke-linecap="round"/>

    <!-- Book 1 (vertical, green outline) -->
    <rect x="265" y="140" width="24" height="90" rx="2" fill="#161b22" stroke="#00e676" stroke-width="2"/>
    <line x1="265" y1="160" x2="289" y2="160" stroke="#00e676" stroke-width="2"/>
    <line x1="265" y1="210" x2="289" y2="210" stroke="#00e676" stroke-width="2"/>
    
    <!-- Book 2 (vertical, solid green) -->
    <rect x="295" y="130" width="28" height="100" rx="2" fill="#00e676" stroke="#00e676" stroke-width="2"/>
    <line x1="309" y1="150" x2="309" y2="210" stroke="#0d1117" stroke-width="3" stroke-dasharray="6,4"/>

    <!-- Book 3 (vertical, gray outline) -->
    <rect x="329" y="150" width="22" height="80" rx="2" fill="#161b22" stroke="#6e7681" stroke-width="2"/>
    <line x1="329" y1="170" x2="351" y2="170" stroke="#6e7681" stroke-width="2"/>

    <!-- Book 4 (leaning, green outline) -->
    <rect x="357" y="150" width="22" height="80" rx="2" fill="#161b22" stroke="#00e676" stroke-width="2" transform="rotate(16, 357, 230)"/>
  </g>
  <!-- Card Border -->
  <rect x="120" y="70" width="340" height="200" rx="12" fill="none" stroke="#30363d" stroke-width="2"/>

  <!-- Content (Right) -->
  <!-- Top Command Line Prompt -->
  <text x="520" y="105" font-family="ui-monospace, Consolas, 'SF Mono', monospace" font-size="14">
    <tspan fill="#00e676">❯ </tspan><tspan fill="#6e7681">Loaded 42 active feeds from local store</tspan>
  </text>

  <!-- Wordmark -->
  <text x="520" y="165" font-family="ui-monospace, Consolas, 'SF Mono', monospace" font-size="54" font-weight="800" letter-spacing="-1">
    <tspan fill="#f0f6fc">RSS-</tspan><tspan fill="#00e676">BOOKSTORE</tspan><tspan fill="#00e676" class="cursor">█</tspan>
  </text>

  <!-- Tagline -->
  <text x="520" y="210" fill="#6e7681" font-family="ui-monospace, Consolas, 'SF Mono', monospace" font-size="20" font-weight="500" letter-spacing="0.5">Power-User RSS Feed Manager</text>

  <!-- Status Badges -->
  <!-- Badge 1: Status -->
  <rect x="520" y="240" width="115" height="24" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="577.5" y="256" fill="#6e7681" font-family="ui-monospace, Consolas, 'SF Mono', monospace" font-size="11" font-weight="bold" text-anchor="middle">STATUS: <tspan fill="#00e676">ONLINE</tspan></text>

  <!-- Badge 2: Store -->
  <rect x="647" y="240" width="115" height="24" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="704.5" y="256" fill="#6e7681" font-family="ui-monospace, Consolas, 'SF Mono', monospace" font-size="11" font-weight="bold" text-anchor="middle">STORE: <tspan fill="#00e676">LOCAL</tspan></text>

  <!-- Badge 3: Mode -->
  <rect x="774" y="240" width="115" height="24" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="831.5" y="256" fill="#6e7681" font-family="ui-monospace, Consolas, 'SF Mono', monospace" font-size="11" font-weight="bold" text-anchor="middle">MODE: <tspan fill="#00e676">SECURE</tspan></text>
</svg>
