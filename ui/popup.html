<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <style>
    :root {
      --bg: #fff;
      --text: #1a1a1a;
      --text-muted: #888;
      --border: #eee;
      --btn-bg: #fff;
      --btn-hover: #f5f5f5;
      --btn-border: #ddd;
      --accent: #e63946;
      --accent-hover: #c5303c;
      --error: #d32f2f;
      --success: #2a9d8f;
      --discover-bg: #f0f7ff;
      --discover-border: #b3d4fc;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1e1e;
        --text: #e0e0e0;
        --text-muted: #999;
        --border: #333;
        --btn-bg: #2a2a2a;
        --btn-hover: #333;
        --btn-border: #444;
        --accent: #e63946;
        --accent-hover: #ff4d5a;
        --error: #ff6b6b;
        --success: #4ecdc4;
        --discover-bg: #1a2a3a;
        --discover-border: #2a4a6a;
      }
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 320px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 13px; color: var(--text); background: var(--bg); padding: 12px; }
    h1 { font-size: 15px; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
    h1 span { color: var(--accent); }
    .feed-list { max-height: 300px; overflow-y: auto; }
    .feed-item { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--border); }
    .feed-item:last-child { border-bottom: none; }
    .feed-name { font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 200px; }
    .feed-info { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
    .feed-count { font-size: 11px; color: var(--text-muted); }
    .feed-error { font-size: 10px; color: var(--error); max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .empty { color: var(--text-muted); font-style: italic; padding: 16px 0; text-align: center; }
    .actions { margin-top: 10px; display: flex; gap: 6px; flex-wrap: wrap; }
    button { padding: 6px 12px; border: 1px solid var(--btn-border); border-radius: 4px; background: var(--btn-bg); color: var(--text); cursor: pointer; font-size: 12px; }
    button:hover { background: var(--btn-hover); }
    button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    button.primary:hover { background: var(--accent-hover); }
    .status { font-size: 11px; color: var(--text-muted); margin-top: 6px; }
    .status.success { color: var(--success); }
    .status.error { color: var(--error); }
    .discover-section { margin-top: 8px; padding: 8px; background: var(--discover-bg); border: 1px solid var(--discover-border); border-radius: 4px; display: none; }
    .discover-section.visible { display: block; }
    .discover-item { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; font-size: 12px; }
    .discover-item button { font-size: 11px; padding: 3px 8px; }
    .discover-info { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
  </style>
</head>
<body>
  <h1>RSS<span>:</span>BOOKSTORE</h1>
  <div id="feedList" class="feed-list"></div>
  <div class="actions">
    <button id="openFeedsBtn" class="primary">Lesezeichen öffnen</button>
    <button id="updateBtn">Aktualisieren</button>
    <button id="discoverBtn">Feed entdecken</button>
    <button id="optionsBtn">Einstellungen</button>
  </div>
  <div id="discoverSection" class="discover-section"></div>
  <div id="status" class="status"></div>
  <script src="popup.js" type="module"></script>
</body>
</html>
