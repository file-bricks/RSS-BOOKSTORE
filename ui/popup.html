<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <style>
    /* RSS:BOOKSTORE Popup — Terminal-Refined Design v2 */
    :root {
      --bg:             #0d1117;
      --surface:        #161b22;
      --surface2:       #1c2128;
      --text:           #c9d1d9;
      --text-muted:     #6e7681;
      --text-bright:    #e6edf3;
      --border:         #21262d;
      --accent:         #00e676;
      --accent-dim:     rgba(0,230,118,.12);
      --accent-hover:   #00c853;
      --error:          #ff6b6b;
      --success:        #00e676;
      --info:           #58a6ff;
      --discover-bg:    #0d1f2d;
      --discover-border:#1a3a5a;
      --font-mono:      ui-monospace, Menlo, Cascadia Code, Consolas, monospace;
      --font-sans:      -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --radius:         4px;
      --transition:     .15s ease;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg:             #f6f8fa;
        --surface:        #fff;
        --surface2:       #f0f2f5;
        --text:           #1f2328;
        --text-muted:     #656d76;
        --text-bright:    #1f2328;
        --border:         #d0d7de;
        --accent:         #0a7a3e;
        --accent-dim:     rgba(10,122,62,.10);
        --accent-hover:   #068934;
        --error:          #cf222e;
        --success:        #1a7f37;
        --info:           #0969da;
        --discover-bg:    #ddf4ff;
        --discover-border:#54aeff;
      }
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: var(--font-sans);
      font-size: 12px;
      color: var(--text);
      background: var(--bg);
      padding: 0;
    }

    /* Header */
    .popup-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px 8px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .brand {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0;
      color: var(--text-bright);
    }
    .brand-sep { color: var(--accent); }

    /* Feed list */
    .feed-list {
      max-height: 260px;
      overflow-y: auto;
      padding: 4px 0;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .feed-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 12px;
      border-bottom: 1px solid var(--border);
      transition: background var(--transition);
    }
    .feed-item:hover { background: var(--surface); }
    .feed-item:last-child { border-bottom: none; }
    .feed-name {
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 190px;
      color: var(--text-bright);
      font-size: 12px;
    }
    .feed-info {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 2px;
      flex-shrink: 0;
    }
    .feed-count {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--accent);
      background: var(--accent-dim);
      padding: 1px 5px;
      border-radius: 10px;
    }
    .feed-error {
      font-size: 10px;
      color: var(--error);
      max-width: 110px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .empty {
      color: var(--text-muted);
      font-style: italic;
      padding: 20px 12px;
      text-align: center;
      font-size: 11px;
    }

    /* Actions */
    .actions {
      padding: 8px 12px;
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }
    button {
      padding: 5px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface2);
      color: var(--text);
      cursor: pointer;
      font-size: 11px;
      font-family: var(--font-sans);
      transition: all var(--transition);
      white-space: nowrap;
    }
    button:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    button.primary {
      background: var(--accent);
      color: #0d1117;
      border-color: var(--accent);
      font-weight: 600;
    }
    button.primary:hover {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
    }

    /* Status */
    .status {
      font-size: 10px;
      color: var(--text-muted);
      padding: 4px 12px 6px;
      font-family: var(--font-mono);
      min-height: 20px;
    }
    .status.success { color: var(--success); }
    .status.error { color: var(--error); }

    /* Discover */
    .discover-section {
      margin: 0 12px 8px;
      padding: 8px 10px;
      background: var(--discover-bg);
      border: 1px solid var(--discover-border);
      border-radius: var(--radius);
      display: none;
    }
    .discover-section.visible { display: block; }
    .discover-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0;
      font-size: 11px;
    }
    .discover-item button { font-size: 10px; padding: 2px 7px; }
    .discover-info {
      font-size: 10px;
      color: var(--text-muted);
      margin-bottom: 4px;
      font-family: var(--font-mono);
    }
  </style>
</head>
<body>
  <div class="popup-header">
    <span class="brand">RSS<span class="brand-sep">:</span>BOOKSTORE</span>
  </div>
  <div id="feedList" class="feed-list"></div>
  <div class="actions">
    <button id="openFeedsBtn" class="primary">Lesezeichen öffnen</button>
    <button id="updateBtn">Aktualisieren</button>
    <button id="discoverBtn">Feed entdecken</button>
    <button id="optionsBtn">Einstellungen</button>
  </div>
  <div id="discoverSection" class="discover-section"></div>
  <div id="status" class="status"></div>
  <script src="popup.js" type="module"></script>
</body>
</html>
